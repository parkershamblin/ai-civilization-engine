server:
  port: ${PORT:8081}

spring:
  application:
    name: event-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/event_db
    username: ${EVENT_DB_USER:event_service}
    password: ${EVENT_DB_PASSWORD:event_service_dev}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: event-service.event-store
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      # Batch listener: one poll's records -> one multi-row ledger insert;
      # offsets commit only after the whole batch is stored.
      type: batch
      ack-mode: batch
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

civ:
  # All event topics PLUS both command topics — commands are archived for
  # causation chains, never acted on (each plane has exactly one executor:
  # minecraft-service for the world, government-service for governance).
  topics: ${CIV_TOPICS:world.events,agent.events,social.events,government.events,commands.minecraft,commands.government}
  # Kafka listener containers per @KafkaListener — spreads the six topics'
  # partitions across parallel consumer threads.
  consumer-concurrency: ${CIV_CONSUMER_CONCURRENCY:3}
  sse:
    heartbeat-ms: 15000
    timeout-ms: 1800000
    # Bounded hand-off from ingest to the fan-out thread; drops oldest under
    # pressure (the live feed is lossy by contract — the store backfills).
    fanout-queue-capacity: 1024

# Cross-repo task orchestrator (go-task). Single binary, embeds its own POSIX
# shell — the same task runs identically in PowerShell, Git Bash, and CI.
# npm scripts stay inside each Node package for package-local concerns.
version: "3"

dotenv: [".env"]

vars:
  COMPOSE: docker compose -f infrastructure/docker/docker-compose.yml --env-file .env

tasks:
  up:
    desc: Start the infra profile (Postgres, Redis, Redpanda, Prometheus, Grafana) — healthcheck-gated, then provision topics
    cmds:
      - "{{.COMPOSE}} --profile infra up -d --wait"
      - node scripts/provision-topics.mjs

  up:all:
    desc: Infra + app profiles (app entries land with each service's first feature). Infra first, then topics, THEN app — explicit provisioning must beat the producers' auto-create race on a fresh cluster
    cmds:
      - "{{.COMPOSE}} --profile infra up -d --wait"
      - node scripts/provision-topics.mjs
      - "{{.COMPOSE}} --profile infra --profile app up -d --wait"

  topics:
    desc: Provision the Kafka topic map explicitly (idempotent; fails loud on partition mismatch — see docs/runbooks/kafka-topic-migration.md)
    cmds:
      - node scripts/provision-topics.mjs

  down:
    desc: Stop everything (volumes preserved)
    cmds:
      - "{{.COMPOSE}} --profile infra --profile app --profile minecraft down"

  nuke:
    desc: Stop everything AND delete volumes — fresh world
    prompt: This deletes all local data volumes. Continue?
    cmds:
      - "{{.COMPOSE}} --profile infra --profile app --profile minecraft down -v"

  logs:
    desc: Tail all container logs
    cmds:
      - "{{.COMPOSE}} logs -f --tail=100"

  smoke:
    desc: "Version-pin canary: one throwaway bot connects to the MC server, chats, disconnects"
    cmds:
      - node scripts/smoke.js

  gen:
    desc: Regenerate TS/Python types from packages/events schemas (output is committed; CI drift-checks it)
    cmds:
      - npm run gen --workspace @civ/events

  seed:
    desc: Provision villagers.json (first VILLAGER_COUNT), emit VillagerCreated, spawn bots, start tick loops
    cmds:
      - curl -s -X POST http://localhost:8001/internal/seed

  test:
    desc: Run all test suites (contracts, minecraft, agent, memory, event, government)
    vars:
      # .\gradlew.bat (explicit path, double-backslash survives the POSIX
      # shell): bare batch names fail under NoDefaultCurrentDirectoryInExePath=1
      # (agent/hardened shells); the explicit form works everywhere.
      GRADLEW: '{{if eq OS "windows"}}cmd /c .\\gradlew.bat{{else}}./gradlew{{end}}'
    cmds:
      - npm test --workspace @civ/events
      - npm test --workspace @civ/minecraft-service
      - cd services/agent-service && uv run pytest -q
      - cd services/memory-service && uv run pytest -q
      - cd services/event-service && {{.GRADLEW}} test
      - cd services/government-service && {{.GRADLEW}} test

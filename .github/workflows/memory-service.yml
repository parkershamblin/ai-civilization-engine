name: memory-service
on:
  push:
    branches: [main]
    paths: ["services/memory-service/**", "packages/events/**", ".github/workflows/_reusable-service.yml", ".github/workflows/memory-service.yml"]
  pull_request:
    paths: ["services/memory-service/**", "packages/events/**", ".github/workflows/_reusable-service.yml", ".github/workflows/memory-service.yml"]
permissions:
  contents: read
  packages: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    uses: ./.github/workflows/_reusable-service.yml
    with:
      service: memory-service
      language: python
      workdir: services/memory-service
      # M1-10: gate ON, scoped to the DoD-named paths (service + scoring)
      coverage-args: "--cov=memory_service.service --cov=memory_service.scoring --cov-report=term --cov-fail-under=80"
      image: true
      context: services/memory-service

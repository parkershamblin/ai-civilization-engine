name: dashboard
on:
  push:
    branches: [main]
    paths: ["apps/dashboard/**", "package-lock.json", ".github/workflows/_reusable-service.yml"]
  pull_request:
    paths: ["apps/dashboard/**", "package-lock.json", ".github/workflows/_reusable-service.yml"]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    uses: ./.github/workflows/_reusable-service.yml
    with:
      service: dashboard
      language: node
      workdir: apps/dashboard
      npm-workspace: "@civ/dashboard"

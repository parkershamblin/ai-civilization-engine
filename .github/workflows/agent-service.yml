name: agent-service
on:
  push:
    branches: [main]
    paths: ["services/agent-service/**", "packages/events/**", ".github/workflows/_reusable-service.yml"]
  pull_request:
    paths: ["services/agent-service/**", "packages/events/**", ".github/workflows/_reusable-service.yml"]
permissions:
  contents: read
  packages: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    uses: ./.github/workflows/_reusable-service.yml
    with:
      service: agent-service
      language: python
      workdir: services/agent-service
      coverage-args: "--cov=agent_service --cov-report=term"
      image: true

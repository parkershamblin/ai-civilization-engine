name: government-service
on:
  push:
    branches: [main]
    # packages/events is included from day one: M2-7 makes this service a
    # contracts consumer (fixtures in tests), and the drift gate must not
    # depend on someone remembering a paths: edit. This workflow's own file
    # is in paths: — callers must self-include (the M1 Actions gotcha).
    paths: ["services/government-service/**", "packages/events/**", ".github/workflows/_reusable-service.yml", ".github/workflows/government-service.yml"]
  pull_request:
    paths: ["services/government-service/**", "packages/events/**", ".github/workflows/_reusable-service.yml", ".github/workflows/government-service.yml"]
permissions:
  contents: read
  packages: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    uses: ./.github/workflows/_reusable-service.yml
    with:
      service: government-service
      language: java
      workdir: services/government-service
      image: true
      context: services/government-service

name: event-service
on:
  push:
    branches: [main]
    paths: ["services/event-service/**", "packages/events/**", ".github/workflows/_reusable-service.yml"]
  pull_request:
    paths: ["services/event-service/**", "packages/events/**", ".github/workflows/_reusable-service.yml"]
jobs:
  ci:
    uses: ./.github/workflows/_reusable-service.yml
    with:
      service: event-service
      language: java
      workdir: services/event-service
      image: true
      context: services/event-service

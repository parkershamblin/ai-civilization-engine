name: minecraft-service
on:
  push:
    branches: [main]
    paths: ["services/minecraft-service/**", "packages/events/**", "patches/**", "package-lock.json", ".github/workflows/_reusable-service.yml", ".github/workflows/minecraft-service.yml"]
  pull_request:
    paths: ["services/minecraft-service/**", "packages/events/**", "patches/**", "package-lock.json", ".github/workflows/_reusable-service.yml", ".github/workflows/minecraft-service.yml"]
permissions:
  contents: read
  packages: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    uses: ./.github/workflows/_reusable-service.yml
    with:
      service: minecraft-service
      language: node
      workdir: services/minecraft-service
      npm-workspace: "@civ/minecraft-service"
      image: true

name: ai-civilization-engine

# Profiles (see docs/architecture/05-repository-devops.md §2):
#   infra     — stateful/third-party backbone; started once, left running
#   app       — the services (entries land in the PR that ships each service's
#               first real feature — never before)
#   minecraft — optional containerized PaperMC; off by default because a
#               working host server already exists (MC_HOST=host.docker.internal)
#
# All images pinned to full patch tags — same discipline as MC_VERSION.

services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    profiles: [infra]
    ports: ["5432:5432"]
    # One instance hosts all five logical DBs (agent/memory/event/government/
    # analytics), so stock defaults (shared_buffers=128MB) starve the HNSW
    # vector searches and the ledger's append stream of the same page cache.
    # Sized for the 2G mem_limit below; revisit when the DBs split.
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
    mem_limit: 2g
    environment:
      POSTGRES_USER: civ
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civ_dev}
      POSTGRES_DB: civ
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civ -d civ"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7.4.2-alpine
    profiles: [infra]
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    profiles: [infra]
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --default-log-level=warn
      # Auto-create OFF: a producer that beats provision-topics.mjs used to
      # silently recreate its topic at the broker default of 1 partition (the
      # pre-M2-4 decision→speech-gap bug). Misordering now fails loud instead.
      - --set
      - redpanda.auto_create_topics_enabled=false
    mem_limit: 1536m
    ports:
      - "9092:9092"   # external Kafka listener (host-run services)
      - "9644:9644"   # admin API (rpk, metrics)
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  redpanda-console:
    image: redpandadata/console:v2.7.2
    profiles: [infra]
    ports: ["8085:8080"]
    environment:
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [infra]
    ports: ["9090:9090"]
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [infra]
    ports: ["3001:3000"]   # 3000 is reserved for the Next.js dashboard
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001   # generated links must use the host port, not the in-container 3000
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # OpenSearch and Loki/Promtail arrive at their milestones (M2 / M1) — not before.

  minecraft-service:
    build:
      context: ../..
      dockerfile: services/minecraft-service/Dockerfile
    profiles: [app]
    # the command consumer exits(1) on an unrecoverable Kafka crash — restart
    # LOUDLY (visible in restart counts) instead of zombie-idling the world
    restart: on-failure
    # 3100-3105: the POV film-rig port pool (inert unless POV_VIEWER=1)
    ports: ["8003:8003", "3100-3105:3100-3105"]
    environment:
      MC_HOST: ${MC_HOST:-host.docker.internal}
      MC_PORT: ${MC_PORT:-25565}
      MC_VERSION: ${MC_VERSION:-1.21.6}
      POV_VIEWER: ${POV_VIEWER:-0}
      POV_VIEW_DISTANCE: ${POV_VIEW_DISTANCE:-4}
      KAFKA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # RCON to the Paper container (compose-internal, port never published) —
      # the inventory poller reads human players' inventories via per-slot
      # `data get`. Unreachable RCON (e.g. vanilla host-server fallback)
      # degrades gracefully to bots-only metrics.
      RCON_HOST: ${RCON_HOST:-minecraft}
      RCON_PORT: ${RCON_PORT:-25575}
      RCON_PASSWORD: ${RCON_PASSWORD:-civ_rcon}
      # Survival reflexes (eat/threat/hunt) run on code defaults (config.ts);
      # only the staged-rollout levers are exposed: fight cap 0 = flee-only
      # fleet, stance brave = armed villagers stand their ground vs melee.
      THREAT_MAX_CONCURRENT_FIGHTS: ${THREAT_MAX_CONCURRENT_FIGHTS:-4}
      THREAT_DEFAULT_STANCE: ${THREAT_DEFAULT_STANCE:-cautious}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8003/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  memory-service:
    build: ../../services/memory-service
    profiles: [app]
    restart: on-failure
    ports: ["8002:8002"]
    environment:
      POSTGRES_HOST: postgres
      KAFKA_BROKERS: redpanda:29092
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      REFLECTION_ENABLED: ${REFLECTION_ENABLED:-true}
      REFLECTION_DAILY_TOKEN_BUDGET: ${REFLECTION_DAILY_TOKEN_BUDGET:-200000}
      REFLECTIONS_PER_HOUR_CAP: ${REFLECTIONS_PER_HOUR_CAP:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  agent-service:
    build:
      context: ../..
      dockerfile: services/agent-service/Dockerfile
    profiles: [app]
    ports: ["8001:8001"]
    environment:
      MEMORY_SERVICE_URL: http://memory-service:8002
      POSTGRES_HOST: postgres
      KAFKA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      LLM_MODEL_OLLAMA: ${LLM_MODEL_OLLAMA:-llama3.1:8b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_DAILY_TOKEN_BUDGET: ${LLM_DAILY_TOKEN_BUDGET:-2000000}
      # Backpressure for the shared LLM backend: excess deliberations queue at
      # the provider instead of thrashing one GPU with 20 concurrent requests.
      LLM_MAX_CONCURRENT_REQUESTS: ${LLM_MAX_CONCURRENT_REQUESTS:-4}
      # Per-team brains (RB filming): "red=llama3.1:8b,blue=gemma3:12b" routes
      # each race team to its own local model. Blank = off (single brain).
      LLM_TEAM_MODELS: ${LLM_TEAM_MODELS:-}
      # KV-cache ceiling per request — keeps two team models resident on one GPU.
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      TICK_INTERVAL_SECONDS: ${TICK_INTERVAL_SECONDS:-60}
      VILLAGER_COUNT: ${VILLAGER_COUNT:-1}
      # D2 filming lever (M2-10): one shared-aim line in every system prompt.
      # Blank = off; pulled only if the arc stalls (plan ruling).
      COMMUNITY_GOAL: ${COMMUNITY_GOAL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      memory-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  event-service:
    build: ../../services/event-service
    profiles: [app]
    ports: ["8081:8081"]
    environment:
      POSTGRES_HOST: postgres
      EVENT_DB_USER: event_service
      EVENT_DB_PASSWORD: event_service_dev
      KAFKA_BROKERS: redpanda:29092
      # Explicit and complete (matches the image default) — the ledger's
      # subscription list should be visible where operators look first.
      CIV_TOPICS: world.events,agent.events,social.events,government.events,commands.minecraft,commands.government
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  government-service:
    # Entered compose with its first real feature (M2-6: election state
    # machine); M2-7 made it the single governance executor — consumes
    # commands.government, emits facts/rejections on government.events.
    # MOTHBALLED for the Red-vs-Blue arc (ADR-10, RB-1): civic life is off
    # the critical path, so the service left the default app profile — start
    # it explicitly with --profile gov when the social arc resumes. Contracts,
    # code, and government_db stay intact (debt register entry 1).
    build: ../../services/government-service
    profiles: [gov]
    ports: ["8082:8082"]
    environment:
      POSTGRES_HOST: postgres
      GOVERNMENT_DB_USER: government_service
      GOVERNMENT_DB_PASSWORD: government_service_dev
      KAFKA_BROKERS: redpanda:29092
      # Filming levers: window durations without a rebuild (seconds).
      ELECTION_NOMINATING_WINDOW_SECONDS: ${ELECTION_NOMINATING_WINDOW_SECONDS:-600}
      ELECTION_VOTING_WINDOW_SECONDS: ${ELECTION_VOTING_WINDOW_SECONDS:-900}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  minecraft:
    # Off by default (profile). Containerized PaperMC — enabled at M1-8, when 20
    # bots outgrow the vanilla host server. The vanilla host server stays the
    # documented fallback (set MC_HOST back to host.docker.internal to use it).
    # Image pinned to a full patch tag (itzg release, not floating 'java21') —
    # same discipline as MC_VERSION. Bump only deliberately.
    image: itzg/minecraft-server:2026.7.0-java21
    profiles: [minecraft]
    # 3G heap + JVM/native overhead; a hard ceiling so a Paper leak can't
    # starve Postgres/Redpanda (nothing else on the host caps it).
    mem_limit: 4g
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: ${MC_VERSION:-1.21.6}
      ONLINE_MODE: "FALSE"          # bots auth 'offline' (BotSession.ts) — must match
      # Easy-by-default since 2026-07-17 (Parker's call; Survival era). Seeds
      # NEW worlds only — the live world's difficulty lives in level.dat
      # (flipped via RCON + save-all + restart-verify, the closed-loop
      # procedure). A nuked world boots easy with DEFAULT gamerules: run the
      # post-nuke re-apply checklist (training wheels keepInventory=true /
      # doInsomnia=false / mobGriefing=false + connection-throttle -1).
      DIFFICULTY: easy
      OPS: ParkerShamblin           # offline mode: helper derives the offline UUID
      MAX_PLAYERS: "30"             # 20 bot slots + room for Parker to spectate
      MEMORY: 3G
      VIEW_DISTANCE: "4"            # low sim/view distance keeps MSPT down at 20 bots
      SIMULATION_DISTANCE: "4"
      # RCON is how we read MSPT/TPS during the spike + soak:
      #   docker exec ai-civilization-engine-minecraft-1 rcon-cli mspt
      # rcon-cli inside the image auto-reads RCON_PORT/RCON_PASSWORD from env.
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: ${RCON_PASSWORD:-civ_rcon}
    ports: ["25565:25565"]
    volumes:
      - minecraft-data:/data
    # itzg ships mc-health; gate `up --wait` on the server actually accepting
    # logins (first-boot world-gen takes ~30-60s).
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

volumes:
  postgres-data:
  redis-data:
  redpanda-data:
  prometheus-data:
  grafana-data:
  minecraft-data:

name: ai-civilization-engine

# Profiles (see docs/architecture/05-repository-devops.md §2):
#   infra     — stateful/third-party backbone; started once, left running
#   app       — the services (entries land in the PR that ships each service's
#               first real feature — never before)
#   minecraft — optional containerized PaperMC; off by default because a
#               working host server already exists (MC_HOST=host.docker.internal)
#
# All images pinned to full patch tags — same discipline as MC_VERSION.

services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    profiles: [infra]
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: civ
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civ_dev}
      POSTGRES_DB: civ
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civ -d civ"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7.4.2-alpine
    profiles: [infra]
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    profiles: [infra]
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --default-log-level=warn
    ports:
      - "9092:9092"   # external Kafka listener (host-run services)
      - "9644:9644"   # admin API (rpk, metrics)
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  redpanda-console:
    image: redpandadata/console:v2.7.2
    profiles: [infra]
    ports: ["8085:8080"]
    environment:
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [infra]
    ports: ["9090:9090"]
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [infra]
    ports: ["3001:3000"]   # 3000 is reserved for the Next.js dashboard
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # OpenSearch and Loki/Promtail arrive at their milestones (M2 / M1) — not before.

  minecraft-service:
    build:
      context: ../..
      dockerfile: services/minecraft-service/Dockerfile
    profiles: [app]
    ports: ["8003:8003"]
    environment:
      MC_HOST: ${MC_HOST:-host.docker.internal}
      MC_PORT: ${MC_PORT:-25565}
      MC_VERSION: ${MC_VERSION:-1.21.6}
      KAFKA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8003/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  memory-service:
    build: ../../services/memory-service
    profiles: [app]
    ports: ["8002:8002"]
    environment:
      POSTGRES_HOST: postgres
      KAFKA_BROKERS: redpanda:29092
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      REFLECTION_ENABLED: ${REFLECTION_ENABLED:-true}
      REFLECTION_DAILY_TOKEN_BUDGET: ${REFLECTION_DAILY_TOKEN_BUDGET:-200000}
      REFLECTIONS_PER_HOUR_CAP: ${REFLECTIONS_PER_HOUR_CAP:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  agent-service:
    build:
      context: ../..
      dockerfile: services/agent-service/Dockerfile
    profiles: [app]
    ports: ["8001:8001"]
    environment:
      MEMORY_SERVICE_URL: http://memory-service:8002
      POSTGRES_HOST: postgres
      KAFKA_BROKERS: redpanda:29092
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_DAILY_TOKEN_BUDGET: ${LLM_DAILY_TOKEN_BUDGET:-2000000}
      TICK_INTERVAL_SECONDS: ${TICK_INTERVAL_SECONDS:-60}
      VILLAGER_COUNT: ${VILLAGER_COUNT:-1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      memory-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  event-service:
    build: ../../services/event-service
    profiles: [app]
    ports: ["8081:8081"]
    environment:
      POSTGRES_HOST: postgres
      EVENT_DB_USER: event_service
      EVENT_DB_PASSWORD: event_service_dev
      KAFKA_BROKERS: redpanda:29092
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  minecraft:
    # Off by default (profile). Containerized PaperMC — enabled at M1-8, when 20
    # bots outgrow the vanilla host server. The vanilla host server stays the
    # documented fallback (set MC_HOST back to host.docker.internal to use it).
    # Image pinned to a full patch tag (itzg release, not floating 'java21') —
    # same discipline as MC_VERSION. Bump only deliberately.
    image: itzg/minecraft-server:2026.7.0-java21
    profiles: [minecraft]
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: ${MC_VERSION:-1.21.6}
      ONLINE_MODE: "FALSE"          # bots auth 'offline' (BotSession.ts) — must match
      DIFFICULTY: peaceful          # no hostile mobs — villagers can't be killed
      OPS: ParkerShamblin           # offline mode: helper derives the offline UUID
      MEMORY: 3G
      VIEW_DISTANCE: "4"            # low sim/view distance keeps MSPT down at 20 bots
      SIMULATION_DISTANCE: "4"
      # RCON is how we read MSPT/TPS during the spike + soak:
      #   docker exec ai-civilization-engine-minecraft-1 rcon-cli mspt
      # rcon-cli inside the image auto-reads RCON_PORT/RCON_PASSWORD from env.
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: ${RCON_PASSWORD:-civ_rcon}
    ports: ["25565:25565"]
    volumes:
      - minecraft-data:/data
    # itzg ships mc-health; gate `up --wait` on the server actually accepting
    # logins (first-boot world-gen takes ~30-60s).
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

volumes:
  postgres-data:
  redis-data:
  redpanda-data:
  prometheus-data:
  grafana-data:
  minecraft-data:

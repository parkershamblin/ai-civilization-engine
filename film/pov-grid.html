<!doctype html>
<!-- The RB-3 film rig (ADR 10): six first-person viewers in one OBS-capturable
     page. NOT a dashboard feature — a static file with zero build step.
     Prereqs: stack up with POV_VIEWER=1 on minecraft-service (rebuild+recreate
     BETWEEN takes, never mid-race), fleet spawned. Ports are the fixed pool
     3100-3105 in villagers.json seed order: red Elara/Bram/Wren, blue
     Ansel/Petra/Fen. Ports are assigned in SPAWN order — true for a fresh
     `task seed`/spawn-fleet fleet; after despawn/respawn churn, verify the
     name↔port mapping against the `pov viewer up` log lines before filming.
     A dead pane = that racer's viewer never started (same log lines). -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RB POV grid</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0b0b0e; height: 100vh; display: grid;
         grid-template-rows: repeat(2, 1fr); grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px;
         font-family: system-ui, sans-serif; }
  .pane { position: relative; border: 3px solid var(--team); border-radius: 4px; overflow: hidden; }
  .pane iframe { width: 100%; height: 100%; border: 0; background: #000; }
  .pane .tag { position: absolute; top: 6px; left: 8px; z-index: 1; color: #fff;
               background: color-mix(in srgb, var(--team) 75%, black); padding: 2px 10px;
               border-radius: 3px; font-size: 15px; font-weight: 700; letter-spacing: .04em; }
  .red  { --team: #d3402f; }
  .blue { --team: #2f6fd3; }
</style>
</head>
<body>
  <div class="pane red"><span class="tag">ELARA · RED</span><iframe src="http://localhost:3100" title="Elara"></iframe></div>
  <div class="pane red"><span class="tag">BRAM · RED</span><iframe src="http://localhost:3101" title="Bram"></iframe></div>
  <div class="pane red"><span class="tag">WREN · RED</span><iframe src="http://localhost:3102" title="Wren"></iframe></div>
  <div class="pane blue"><span class="tag">ANSEL · BLUE</span><iframe src="http://localhost:3103" title="Ansel"></iframe></div>
  <div class="pane blue"><span class="tag">PETRA · BLUE</span><iframe src="http://localhost:3104" title="Petra"></iframe></div>
  <div class="pane blue"><span class="tag">FEN · BLUE</span><iframe src="http://localhost:3105" title="Fen"></iframe></div>
</body>
</html>
